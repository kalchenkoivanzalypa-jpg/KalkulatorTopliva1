{% extends "base.html" %}
{% block title %}Расчёт — объём{% endblock %}
{% block content %}
<div class="card">
  <h1>Шаг 4. Объём</h1>
  <p class="muted">Назначение: <b>{{ destination_name }}</b></p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/calc/result">
    <label for="volume">Объём, тонн</label>
    <input type="text" name="volume" id="volume" inputmode="decimal" required placeholder="60"/>
    <div class="actions"><button class="btn" type="submit">Рассчитать</button></div>
  </form>
</div>
{% endblock %}
